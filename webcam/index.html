<!doctype html>
<html lang="en">
  <head>
    <!-- Basic page configuration -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webcam Photo App</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- Font Awesome icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- ============================= -->
    <!-- Control Buttons -->
    <!-- ============================= -->

    <div class="controls">
      <button id="startWebcam" onclick="setupWebcam()">Start Webcam</button>

      <button id="stopWebcam" onclick="stopWebcam()">Stop Webcam</button>

      <button id="capturePhoto" onclick="capturePhoto()" style="display: none">
        Capture Photo
      </button>

      <button
        id="downloadAll"
        onclick="downloadAllPhotos()"
        style="display: none"
      >
        Download All
      </button>
    </div>

    <!-- ============================= -->
    <!-- Main Layout -->
    <!-- ============================= -->

    <div id="container">
      <div id="links"></div>

      <!-- Webcam preview -->
      <video id="webcam"></video>

      <div id="rechts"></div>
    </div>

    <div id="unten"></div>

    <!-- ============================= -->
    <!-- Photo Popup Viewer -->
    <!-- ============================= -->

    <div id="photoPopup">
      <div id="popupContent">
        <!-- Close popup button -->
        <button id="popupClose" onclick="closePopup()">×</button>

        <!-- Large preview image -->
        <img id="popupImg" src="" />
      </div>
    </div>

    <!-- ============================= -->
    <!-- External Libraries -->
    <!-- ============================= -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- Main JavaScript -->
    <script src="js/app.js"></script>
  </body>
</html>
